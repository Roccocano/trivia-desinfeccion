<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Interactiva: Higiene y Desinfección IMSS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #00664f; /* Verde IMSS Institucional */
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-primary {
            background-color: #00664f;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-primary:hover {
            background-color: #004d3b;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #e8ecef;
            border: 2px solid #ced4da;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background-color: #dee2e6;
            border-color: #6c757d;
        }
        .correct {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
            color: #721c24;
        }
        .feedback {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .next-btn {
            margin-top: 20px;
            background-color: #00664f;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            float: right;
            display: none;
        }
        .results, .loading-screen {
            text-align: center;
            font-size: 20px;
            display: none;
        }
        .score {
            font-size: 32px;
            font-weight: bold;
            color: #00664f;
            margin: 20px 0;
        }
        /* Spinner de carga */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #00664f;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Trivia: Control Sanitario y Desinfección</h1>
    
    <!-- PANTALLA 1: REGISTRO -->
    <div id="register-box">
        <form id="register-form" onsubmit="startQuiz(event)">
            <div class="form-group">
                <label for="username">Nombre Completo:</label>
                <input type="text" id="username" required placeholder="Ej. Juan Pérez Gómez">
            </div>
            <div class="form-group">
                <label for="matricula">Matrícula o ID:</label>
                <input type="text" id="matricula" required placeholder="Ej. 12345678">
            </div>
            <div class="form-group">
                <label for="turno">Turno:</label>
                <select id="turno" required>
                    <option value="" disabled selected>Selecciona tu turno</option>
                    <option value="Matutino">Matutino</option>
                    <option value="Vespertino">Vespertino</option>
                    <option value="Nocturno">Nocturno</option>
                    <option value="Jornada Acumulada">Jornada Acumulada</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Iniciar Evaluación</button>
        </form>
    </div>

    <!-- PANTALLA 2: JUEGO -->
    <div id="quiz-box" style="display: none;">
        <div class="question" id="question-text">Aquí va la pregunta</div>
        <div class="options" id="options-box"></div>
        <div class="feedback" id="feedback-text"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">Siguiente Pregunta</button>
        <div style="clear: both;"></div>
    </div>

    <!-- PANTALLA 3: PROCESANDO ENVÍO -->
    <div id="loading-box" class="loading-screen">
        <h3>Guardando tus resultados de forma segura...</h3>
        <div class="spinner"></div>
    </div>

    <!-- PANTALLA 4: RESULTADOS -->
    <div id="results-box" class="results">
        <h2>¡Evaluación Finalizada!</h2>
        <p>Tu puntuación es:</p>
        <div class="score" id="final-score">0 / 0</div>
        <p id="evaluation-msg"></p>
        <p style="font-size: 14px; color: #6c757d;">Tus datos han sido registrados en el sistema del departamento.</p>
    </div>
</div>

<script>
    // REEMPLAZA ESTA URL CON LA QUE TE DIO GOOGLE APPS SCRIPT EN LA FASE 1
    const WEB_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0Lrohl_8skZ3iWz2XgWWstETpo6zYmZ3Z5BDhTEv8UYsBTo4ehEMFMwRtU8n7uoQO6g/exec";

    // Banco de preguntas basado en la normativa
    const quizData = [
        {
            question: "¿Cuál es el desinfectante más eficaz y utilizado en el Departamento de Nutrición y Dietética para áreas y utensilios?",
            options: ["Alcohol isopropílico", "Hipoclorito de sodio (cloro)", "Yodo libre", "Agua oxigenada"],
            correct: 1,
            feedback: "¡Correcto! El hipoclorito de sodio es el desinfectante de elección por su alto nivel de eficacia sobre superficies limpias."
        },
        {
            question: "Para el desmanchado de la loza (vajilla de melamina), ¿cada cuánto tiempo se debe realizar y a qué concentración de cloro?",
            options: ["Cada tercer día al 5%", "Cada mes al 20%", "Cada semana al 10% durante 30 minutos", "Diariamente al 1%"],
            correct: 2,
            feedback: "¡Correcto! La loza de melamina tiende a mancharse y debe sumergirse semanalmente al 10% en cloro por 30 minutos."
        },
        {
            question: "¿Qué sustancia inactiva la acción bactericida del hipoclorito de sodio (cloro)?",
            options: ["El agua fría", "La materia orgánica, grasa y suciedad", "Los recipientes de plástico", "El reposo por 5 minutos"],
            correct: 1,
            feedback: "¡Correcto! El cloro es inestable y se inactiva rápidamente ante la presencia de materia orgánica y suciedad, por ello se debe lavar antes de desinfectar."
        },
        {
            question: "De acuerdo a la clasificación de áreas del hospital, ¿en qué categoría entran el Comedor y la Cocina?",
            options: ["Áreas de alto riesgo", "Áreas de riesgo intermedio", "Áreas de bajo riesgo", "Áreas restringidas"],
            correct: 1,
            feedback: "¡Correcto! La cocina y el comedor se clasifican normativamente como áreas de riesgo intermedio."
        },
        {
            question: "Al realizar la limpieza profunda de los utensilios en el Laboratorio de Licuadas, ¿cuánto tiempo deben permanecer sumergidos en la dilución de cloro?",
            options: ["5 minutos", "15 minutos", "1 hora", "30 segundos"],
            correct: 1,
            feedback: "¡Correcto! El protocolo estipula sumergir las ollas y utensilios en una dilución de cloro y dejarlos remojar por 15 minutos."
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let userData = { nombre: "", matricula: "", turno: "" };

    const registerBox = document.getElementById("register-box");
    const quizBox = document.getElementById("quiz-box");
    const loadingBox = document.getElementById("loading-box");
    const resultsBox = document.getElementById("results-box");
    
    const questionText = document.getElementById("question-text");
    const optionsBox = document.getElementById("options-box");
    const feedbackText = document.getElementById("feedback-text");
    const nextButton = document.getElementById("next-button");
    const finalScore = document.getElementById("final-score");
    const evaluationMsg = document.getElementById("evaluation-msg");

    function startQuiz(event) {
        event.preventDefault();
        userData.nombre = document.getElementById("username").value;
        userData.matricula = document.getElementById("matricula").value;
        userData.turno = document.getElementById("turno").value;

        registerBox.style.display = "none";
        quizBox.style.display = "block";
        loadQuestion();
    }

    function loadQuestion() {
        resetState();
        let currentQuestion = quizData[currentQuestionIndex];
        questionText.innerText = (currentQuestionIndex + 1) + ". " + currentQuestion.question;

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.innerText = option;
            button.classList.add("option-btn");
            button.addEventListener("click", () => selectOption(index, button));
            optionsBox.appendChild(button);
        });
    }

    function resetState() {
        feedbackText.style.display = "none";
        nextButton.style.display = "none";
        while (optionsBox.firstChild) {
            optionsBox.removeChild(optionsBox.firstChild);
        }
    }

    function selectOption(selectedIndex, clickedButton) {
        let currentQuestion = quizData[currentQuestionIndex];
        let allButtons = optionsBox.getElementsByClassName("option-btn");

        for (let btn of allButtons) {
            btn.disabled = true;
        }

        if (selectedIndex === currentQuestion.correct) {
            clickedButton.classList.add("correct");
            score++;
        } else {
            clickedButton.classList.add("incorrect");
            allButtons[currentQuestion.correct].classList.add("correct");
        }

        feedbackText.innerText = currentQuestion.feedback;
        feedbackText.style.display = "block";
        feedbackText.style.backgroundColor = selectedIndex === currentQuestion.correct ? "#d4edda" : "#f8d7da";
        feedbackText.style.color = selectedIndex === currentQuestion.correct ? "#155724" : "#721c24";
        
        nextButton.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            sendDataToExcel();
        }
    }

    function sendDataToExcel() {
        quizBox.style.display = "none";
        loadingBox.style.display = "block";

        const payload = {
            nombre: userData.nombre,
            matricula: userData.matricula,
            turno: userData.turno,
            puntaje: score + " / " + quizData.length
        };

        // Envío asíncrono a Google Sheets sin recargar la página
        fetch(WEB_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Evita problemas de CORS comunes en despliegues estáticos
            cache: "no-cache",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            showResults();
        })
        .catch(err => {
            console.error("Error al enviar:", err);
            // De igual forma mostramos resultados al usuario por si falla la red, no arruinar su experiencia
            showResults(); 
        });
    }

    function showResults() {
        loadingBox.style.display = "none";
        resultsBox.style.display = "block";
        finalScore.innerText = score + " / " + quizData.length;

        let porcentaje = (score / quizData.length) * 100;
        if (porcentaje === 100) {
            evaluationMsg.innerText = "¡Excelente! Conoces perfectamente las Normas de Calidad e Higiene.";
        } else if (porcentaje >= 70) {
            evaluationMsg.innerText = "¡Buen trabajo! Buen manejo técnico, repasa los tiempos de exposición.";
        } else {
            evaluationMsg.innerText = "Es necesario volver a repasar el Lineamiento de Diluciones Desinfectantes.";
        }
    }
</script>

</body>
</html>
